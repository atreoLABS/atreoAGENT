name: Publish container image

on:
  push:
    branches: [main]
    tags: ['v*.*.*']
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # Gate the publish on the full security pipeline (govulncheck, gosec,
  # gitleaks, image scan). Reuses security.yml so there's a single scan
  # definition; publish only runs if every scan passes.
  security:
    uses: ./.github/workflows/security.yml
    permissions:
      contents: read

  publish:
    name: Build and push to GHCR
    needs: security
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write # cosign keyless (OIDC) signing
    steps:
      - uses: actions/checkout@v7

      - uses: docker/setup-qemu-action@v4

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=sha,format=short
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - id: build_meta
        run: |
          # Tagged releases report their semver; main/branch builds report the
          # short commit hash as the version (matches the image's :sha-… tag).
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            echo "version=${{ steps.meta.outputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          fi
          echo "commit=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          echo "date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      # Vulnerability scanning lives in the security workflow (which runs on
      # PRs, main, tags, and weekly); this workflow only builds, pushes, and
      # signs. Gating happens at PR-merge via branch protection.
      - id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            VERSION=${{ steps.build_meta.outputs.version }}
            COMMIT=${{ steps.build_meta.outputs.commit }}
            DATE=${{ steps.build_meta.outputs.date }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # OCI references must be lowercase; github.repository can contain
      # uppercase (atreoLABS/atreoAGENT-dev), which syft/cosign reject. The
      # push itself is fine because docker/metadata-action lowercases its tags.
      - id: imgref
        run: echo "value=ghcr.io/${GITHUB_REPOSITORY,,}@${{ steps.build.outputs.digest }}" >> "$GITHUB_OUTPUT"

      # SBOM (SPDX) for supply-chain transparency, kept as a workflow artifact
      # and attested to the image below. upload-release-assets stays off: the
      # SBOM is bound to the image digest (cosign attest) rather than attached
      # as an unverifiable copy to the GitHub Release — which immutable releases
      # reject post-publish anyway.
      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          image: ${{ steps.imgref.outputs.value }}
          format: spdx-json
          output-file: sbom.spdx.json
          artifact-name: sbom.spdx.json
          upload-release-assets: false

      # Keyless (OIDC) signature over the pushed digest, so consumers can verify
      # provenance with `cosign verify`.
      - uses: sigstore/cosign-installer@v3

      - name: Sign image
        run: cosign sign --yes "${{ steps.imgref.outputs.value }}"

      # Bind the SBOM to the image digest as a signed in-toto attestation, so
      # consumers can verify it for the exact digest with
      # `cosign verify-attestation --type spdxjson`.
      - name: Attest SBOM
        run: cosign attest --yes --predicate sbom.spdx.json --type spdxjson "${{ steps.imgref.outputs.value }}"
