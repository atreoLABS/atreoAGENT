version: 2
updates:
  - package-ecosystem: gomod
    directory: "/"
    schedule:
      interval: weekly
      day: friday
      time: "20:00"
    groups:
      # Non-breaking bumps land in one PR per week. Majors are intentionally
      # left ungrouped so each gets its own PR (Dependabot's default), making a
      # breaking upgrade easy to review, merge, or revert in isolation.
      go-minor-patch:
        update-types:
          - minor
          - patch

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: friday
      time: "20:00"
    groups:
      # Action version bumps are almost always safe; group everything,
      # including majors, since CI itself catches breakage.
      actions:
        patterns:
          - "*"

  # Base-image bumps (golang build stage + alpine runtime, including the Go
  # toolchain version in the build image) so the published image picks up new
  # releases and CVE fixes. patterns:["*"] groups all bumps, majors included.
  - package-ecosystem: docker
    directory: "/"
    schedule:
      interval: weekly
      day: friday
      time: "20:00"
    groups:
      docker:
        patterns:
          - "*"
