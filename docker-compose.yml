services:
  atreoagent:
    build: .
    restart: unless-stopped
    network_mode: host
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun
    volumes:
      - ./data:/var/lib/atreoagent
      # Optional: mount the Docker socket to allow using container names in app
      # InternalURL (e.g. http://jellyfin:8096) without exposing ports.
      # The agent queries the Docker API read-only to resolve names to IPs.
      # - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      # Optional: manual endpoint (if UPnP/NAT-PMP fails)
      # ENDPOINT_IP: ""
      # ENDPOINT_PORT: "51820"

      # Optional: WireGuard port (default: 51820)
      # WG_PORT: "51820"

      # Optional: proxy ports (default: 80/443)
      # PROXY_HTTP_PORT: "80"
      # PROXY_HTTPS_PORT: "443"

      # Optional: auth endpoint port (default: 9091)
      # PROXY_AUTH_PORT: "9091"

      # Optional: disable built-in proxy (use your own reverse proxy)
      # PROXY_ENABLED: "false"

      # Optional: disable tunnel firewall (default: enabled).
      # When enabled, paired peers can only reach the proxy ports on the
      # host. Disable if you intentionally want every host port reachable
      # to every paired device — this bypasses the per-app ACL.
      # WG_FIREWALL_ENABLED: "false"
